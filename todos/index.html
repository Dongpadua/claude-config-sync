<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Todos</title>
<style>
:root {
  --bg: #1e1e2e;
  --surface: #252536;
  --border: #333348;
  --text: #cdd6f4;
  --muted: #585b70;
  --pri-high: #f38ba8;
  --pri-med: #f9e2af;
  --pri-low: #a6adc8;
  --accent: #89b4fa;
  --done: #45475a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  padding: 6px 6px 8px 6px;
  user-select: none;
  line-height: 1.4;
}

/* ── Header row: title + sync + stats all inline ── */
.header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 13px; font-weight: 600; white-space: nowrap; }
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--muted); transition: background .3s;
}
.sync-dot.online { background: #a6e3a1; }
.sync-dot.offline { background: #f38ba8; }
.stats {
  margin-left: auto; font-size: 11px; color: var(--muted);
  white-space: nowrap; font-variant-numeric: tabular-nums;
}
.stats b { color: var(--accent); font-weight: 600; }

/* ── Action row ── */
.actions {
  display: flex; gap: 3px; margin-bottom: 6px;
}
.actions button {
  flex: 1; padding: 3px 6px; border: 1px solid var(--border);
  border-radius: 4px; background: transparent; color: var(--muted);
  font-size: 10px; cursor: pointer; transition: .12s;
  font-weight: 500;
}
.actions button:hover { background: var(--surface); color: var(--text); }
.actions button.primary { border-color: var(--accent); color: var(--accent); }
.actions button.primary:hover { background: rgba(137,180,250,.1); }

/* ── Task list ── */
.task-list { list-style: none; min-height: 40px; }
.task {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 2px; border-radius: 4px;
  cursor: pointer; transition: background .1s; position: relative;
}
.task:hover { background: var(--surface); }
.task.done .title { text-decoration: line-through; color: var(--done); }
/* Priority dot — color only, no text */
.pri {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.pri.high   { background: var(--pri-high); }
.pri.medium { background: var(--pri-med); }
.pri.low    { background: var(--pri-low); }
/* Checkbox */
.cb {
  width: 14px; height: 14px; border: 1.5px solid var(--border);
  border-radius: 3px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; transition: .1s; color: #111;
}
.task.done .cb { background: var(--accent); border-color: var(--accent); }
.title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.del-btn {
  opacity: 0; background: none; border: none; color: var(--pri-high);
  cursor: pointer; font-size: 13px; line-height: 1; padding: 0 2px;
  transition: opacity .1s; flex-shrink: 0;
}
.task:hover .del-btn { opacity: 1; }

/* ── Add bar ── */
.add-bar {
  display: flex; gap: 3px; margin-top: 6px;
}
.add-bar input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 6px; color: var(--text); font-size: 12px; outline: none;
}
.add-bar input:focus { border-color: var(--accent); }
.add-bar select {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); padding: 2px 3px; font-size: 11px; cursor: pointer;
  -webkit-appearance: none; appearance: none;
}
.add-bar button {
  background: var(--accent); color: #111; border: none;
  border-radius: 4px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #111; padding: 3px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 600; opacity: 0; transition: opacity .2s;
  pointer-events: none; z-index: 10;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 待办</h1>
  <span class="sync-dot" id="syncDot" title="同步状态"></span>
  <span class="stats"><b id="doneCount">—</b>/<span id="totalCount">—</span></span>
</div>

<div class="actions">
  <button class="primary" id="pasteBtn">📋 粘贴添加</button>
  <button id="clearDoneBtn">清除已完成</button>
</div>

<ul class="task-list" id="taskList"></ul>

<div class="add-bar">
  <input id="addInput" placeholder="新任务…" autofocus>
  <select id="addPriority">
    <option value="high">🔴</option>
    <option value="medium" selected>🟡</option>
    <option value="low">⚪</option>
  </select>
  <button id="addBtn">+</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3899/api/todos';
let todos = { tasks: [] };

function $(id) { return document.getElementById(id); }

async function fetchTodos() {
  try {
    const r = await fetch(API); todos = await r.json(); render();
    $('syncDot').classList.add('online'); $('syncDot').classList.remove('offline');
    $('syncDot').title = '已同步';
  } catch(e) {
    $('syncDot').classList.add('offline'); $('syncDot').classList.remove('online');
    $('syncDot').title = '离线';
  }
}

async function addTodo(title, priority) {
  const t = title || $('addInput').value.trim();
  const p = priority || $('addPriority').value;
  if (!t) return;
  await fetch(API + '/add', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title: t, priority: p })
  });
  if (!title) $('addInput').value = '';
  fetchTodos();
}

async function batchAdd(items, priority) {
  await fetch(API + '/add-batch', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ items, priority: priority || 'medium' })
  });
  fetchTodos();
}

async function toggleTodo(id) {
  await fetch(API + '/toggle', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id })
  });
  fetchTodos();
}

async function deleteTodo(id) {
  await fetch(API + '/delete', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id })
  });
  fetchTodos();
}

async function clearDone() {
  const doneIds = (todos.tasks || []).filter(t => t.done).map(t => t.id);
  for (const id of doneIds) await deleteTodo(id);
  toast(doneIds.length ? `已清除 ${doneIds.length} 项` : '没有已完成的');
}

function toast(msg) {
  const el = $('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1400);
}

// ── Paste from clipboard ──
$('pasteBtn').addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    if (!text.trim()) { toast('剪贴板为空'); return; }
    const lines = text.split(/[\n\r]+/).map(s => s.replace(/^[-*•\s\d.]+\s*/, '').trim()).filter(Boolean);
    if (!lines.length) { toast('未识别到有效行'); return; }
    await batchAdd(lines, $('addPriority').value);
    toast(`已添加 ${lines.length} 项`);
  } catch {
    const text = prompt('请粘贴内容（每行一项）：');
    if (text && text.trim()) {
      const lines = text.split(/[\n\r]+/).map(s => s.trim()).filter(Boolean);
      if (lines.length) { await batchAdd(lines, $('addPriority').value); toast(`已添加 ${lines.length} 项`); }
    }
  }
});

$('clearDoneBtn').addEventListener('click', clearDone);

function render() {
  const tasks = todos.tasks || [];
  const doneCount = tasks.filter(t => t.done).length;
  $('doneCount').textContent = doneCount;
  $('totalCount').textContent = tasks.length;

  const priOrder = { high:0, medium:1, low:2 };
  const sorted = [...tasks].sort((a,b) => a.done - b.done || priOrder[a.priority] - priOrder[b.priority]);

  $('taskList').innerHTML = sorted.map(t => `
    <li class="task ${t.done ? 'done' : ''}">
      <span class="pri ${t.priority}" title="${t.priority==='high'?'紧急':t.priority==='medium'?'中等':'低优先'}"></span>
      <div class="cb" onclick="toggleTodo('${t.id}')">${t.done ? '✓' : ''}</div>
      <span class="title" onclick="toggleTodo('${t.id}')">${esc(t.title)}</span>
      <button class="del-btn" onclick="event.stopPropagation();deleteTodo('${t.id}')">×</button>
    </li>
  `).join('');
}

function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('addBtn').addEventListener('click', () => addTodo());
$('addInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

fetchTodos();
setInterval(fetchTodos, 3000);
</script>
</body>
</html>
