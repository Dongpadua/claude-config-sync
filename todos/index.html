<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Todos</title>
<style>
:root {
  --bg: #1e1e2e;
  --surface: #252536;
  --border: #333348;
  --text: #cdd6f4;
  --muted: #6c7086;
  --high: #f38ba8;
  --medium: #f9e2af;
  --low: #a6adc8;
  --accent: #89b4fa;
  --done: #45475a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  padding: 8px;
  user-select: none;
  overflow-x: hidden;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 14px;
  font-weight: 600;
}
.stats { font-size: 11px; color: var(--muted); }
.stats b { color: var(--accent); }

.filters {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.filters button {
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  transition: .15s;
}
.filters button.active { background: var(--accent); color: #111; border-color: var(--accent); }

.task-list { list-style: none; min-height: 60px; }
.task {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.task:hover { background: var(--surface); }
.task.done .title { text-decoration: line-through; color: var(--done); }
.checkbox {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: .15s;
  font-size: 10px;
}
.task.done .checkbox { background: var(--accent); border-color: var(--accent); }
.priority-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.priority-dot.high { background: var(--high); }
.priority-dot.medium { background: var(--medium); }
.priority-dot.low { background: var(--low); }
.title {
  flex: 1;
  font-size: 13px;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cat-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--border);
  color: var(--muted);
  flex-shrink: 0;
}
.del-btn {
  opacity: 0;
  background: none;
  border: none;
  color: var(--high);
  cursor: pointer;
  font-size: 14px;
  padding: 0 4px;
  transition: opacity .15s;
  flex-shrink: 0;
}
.task:hover .del-btn { opacity: 1; }

.add-bar {
  margin-top: 10px;
  display: flex;
  gap: 6px;
}
.add-bar input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.add-bar input:focus { border-color: var(--accent); }
.add-bar select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 4px;
  font-size: 12px;
  cursor: pointer;
}
.add-bar button {
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}

.empty { text-align: center; color: var(--muted); padding: 20px 0; font-size: 12px; }

.footer {
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}
</style>
</head>
<body>

<div class="header">
  <h1>📋 待办</h1>
  <span class="stats"><b id="doneCount">0</b>/<span id="totalCount">0</span></span>
</div>

<div class="filters">
  <button data-cat="all" class="active">全部</button>
  <button data-cat="sync">同步</button>
  <button data-cat="coding">编码</button>
  <button data-cat="personal">个人</button>
  <button data-cat="general">其他</button>
</div>

<ul class="task-list" id="taskList"></ul>
<div class="empty" id="empty">暂无任务，在下方添加 👇</div>

<div class="add-bar">
  <input id="addInput" placeholder="新任务..." autofocus>
  <select id="addPriority">
    <option value="high">🔴</option>
    <option value="medium" selected>🟡</option>
    <option value="low">⚪</option>
  </select>
  <select id="addCategory">
    <option value="general">一般</option>
    <option value="sync">同步</option>
    <option value="coding">编码</option>
    <option value="personal">个人</option>
  </select>
  <button id="addBtn">+</button>
</div>

<div class="footer">
  <span id="syncStatus">● 就绪</span>
  <span id="clock"></span>
</div>

<script>
const API = 'http://localhost:3899/api/todos';
let todos = { tasks: [] };
let filter = 'all';

async function fetchTodos() {
  try {
    const r = await fetch(API);
    todos = await r.json();
    render();
    document.getElementById('syncStatus').textContent = '● 已同步';
    document.getElementById('syncStatus').style.color = '#a6e3a1';
  } catch(e) {
    document.getElementById('syncStatus').textContent = '● 离线';
    document.getElementById('syncStatus').style.color = '#f38ba8';
  }
}

async function addTodo() {
  const input = document.getElementById('addInput');
  const title = input.value.trim();
  if (!title) return;
  const priority = document.getElementById('addPriority').value;
  const category = document.getElementById('addCategory').value;
  await fetch(API + '/add', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title, priority, category })
  });
  input.value = '';
  fetchTodos();
}

async function toggleTodo(id) {
  await fetch(API + '/toggle', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id })
  });
  fetchTodos();
}

async function deleteTodo(id) {
  await fetch(API + '/delete', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id })
  });
  fetchTodos();
}

function render() {
  const tasks = todos.tasks || [];
  const filtered = filter === 'all' ? tasks : tasks.filter(t => t.category === filter);
  const doneTasks = tasks.filter(t => t.done);

  document.getElementById('doneCount').textContent = doneTasks.length;
  document.getElementById('totalCount').textContent = tasks.length;

  const list = document.getElementById('taskList');
  const empty = document.getElementById('empty');

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Sort: undone first, then by priority
  const priOrder = { high:0, medium:1, low:2 };
  filtered.sort((a,b) => a.done - b.done || priOrder[a.priority] - priOrder[b.priority]);

  list.innerHTML = filtered.map(t => `
    <li class="task ${t.done ? 'done' : ''}" data-id="${t.id}">
      <div class="checkbox" onclick="toggleTodo('${t.id}')">${t.done ? '✓' : ''}</div>
      <div class="priority-dot ${t.priority}"></div>
      <span class="title" onclick="toggleTodo('${t.id}')">${esc(t.title)}</span>
      <span class="cat-tag">${t.category}</span>
      <button class="del-btn" onclick="event.stopPropagation();deleteTodo('${t.id}')" title="删除">×</button>
    </li>
  `).join('');
}

function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Filters
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.cat;
    render();
  });
});

// Add
document.getElementById('addBtn').addEventListener('click', addTodo);
document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTodo();
});

// Clock
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
}
tick();
setInterval(tick, 30000);

// Poll for changes
fetchTodos();
setInterval(fetchTodos, 3000);
</script>
</body>
</html>
